services:
  - type: web
    name: shadow-protocol
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: shadow-protocol-db
          property: connectionString

databases:
  - name: shadow-protocol-db
    plan: free
